<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>くらいどりタワー</title>
  <style>
    :root {
      --c-hundreds: #f59e0b;
      --c-tens: #10b981;
      --c-ones: #3b82f6;
      --font: "Hiragino Maru Gothic ProN", "BIZ UDGothic", "Rounded Mplus 1c", sans-serif;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; font-family: var(--font); user-select: none; -webkit-user-select: none; }
    canvas { display: block; touch-action: none; }

    #ui {
      position: fixed; inset: 0;
      pointer-events: none;
      display: flex; flex-direction: column; align-items: flex-start;
      padding-left: 14px;
    }
    #monster-box {
      margin-top: 12px;
      background: rgba(255,255,255,0.8);
      border-radius: 14px;
      padding: 6px 14px 10px;
    }
    #monster-box .label { font-size: 14px; color: #92400e; font-weight: bold; }
    ruby rt { font-size: 0.55em; font-weight: 800; }
    #monster-box #level { color: #7c3aed; margin-left: 6px; }
    #gauge {
      width: 170px; height: 16px;
      margin-top: 4px;
      background: #e2e8f0;
      border-radius: 8px;
      overflow: hidden;
    }
    #gauge-fill {
      height: 100%; width: 0%;
      background: linear-gradient(90deg, #fbbf24, #f97316);
      border-radius: 8px;
      transition: width 0.6s ease;
    }

    #message {
      align-self: center;
      margin-top: 10px;
      font-size: 26px; font-weight: bold;
      color: #475569;
      text-shadow: 0 1px 0 #fff;
      min-height: 36px;
      transition: transform 0.15s;
    }
    #message.good  { color: #059669; }
    #message.miss  { color: #dc2626; }
    #message.clear { color: #d97706; font-size: 38px; }
    #message.pop { animation: pop 0.35s; }
    @keyframes pop {
      0% { transform: scale(0.5); }
      60% { transform: scale(1.25); }
      100% { transform: scale(1); }
    }

    #help {
      position: fixed; bottom: 10px; left: 0; right: 0;
      text-align: center;
      font-size: 15px; color: #64748b; font-weight: bold;
      text-shadow: 0 1px 0 #fff;
      padding: 0 12px;
      line-height: 1.45;
    }

    #flash {
      position: fixed; inset: 0;
      pointer-events: none;
      background: radial-gradient(circle, rgba(255,0,0,0.25), rgba(255,0,0,0.55));
      opacity: 0;
    }

    /* クイズタイム（テスト形式のボーナス問題） */
    #quiz {
      position: fixed; inset: 0;
      display: none;
      align-items: center; justify-content: center;
      background: rgba(15, 23, 42, 0.45);
      z-index: 10;
    }
    #quiz.shown { display: flex; }
    #quiz-panel {
      background: #fffef8;
      border: 6px solid #fbbf24;
      border-radius: 26px;
      padding: 18px 24px 20px;
      width: min(92vw, 600px);
      text-align: center;
      box-shadow: 0 12px 40px rgba(0,0,0,0.35);
      animation: quiz-pop 0.35s;
    }
    @keyframes quiz-pop {
      0% { transform: scale(0.6); opacity: 0; }
      70% { transform: scale(1.06); }
      100% { transform: scale(1); opacity: 1; }
    }
    #quiz-title { font-size: 20px; font-weight: bold; color: #d97706; }
    #quiz-q { font-size: 30px; font-weight: bold; color: #1e293b; margin-top: 10px; line-height: 1.4; }
    #quiz-q .cmp {
      display: inline-block;
      background: #fef9c3;
      border: 3px solid #f59e0b;
      border-radius: 12px;
      padding: 2px 14px;
      margin: 0 4px;
      font-size: 40px;
      letter-spacing: 2px;
    }
    #quiz-q .hole { color: #dc2626; }
    #quiz-sub { font-size: 16px; font-weight: bold; color: #64748b; margin-top: 6px; min-height: 20px; }
    #quiz-canvas { width: 100%; height: auto; margin-top: 8px; display: none; }
    #quiz-answers {
      display: flex; flex-wrap: wrap; gap: 10px;
      justify-content: center;
      margin-top: 14px;
    }
    .quiz-btn {
      font-family: var(--font);
      font-size: 30px; font-weight: bold;
      color: #1e40af;
      background: #eff6ff;
      border: 4px solid #3b82f6;
      border-radius: 16px;
      padding: 10px 20px;
      min-width: 96px;
      cursor: pointer;
    }
    .quiz-btn.small { min-width: 64px; padding: 8px 0; }
    .quiz-btn.sel { background: #fde68a; border-color: #f59e0b; color: #92400e; }
    .quiz-btn.correct { background: #22c55e; border-color: #15803d; color: #fff; }
    .quiz-btn.wrong { background: #ef4444; border-color: #b91c1c; color: #fff; }
    .quiz-btn:disabled { opacity: 0.9; }
    #quiz-confirm {
      display: none;
      font-family: var(--font);
      font-size: 26px; font-weight: bold;
      color: #fff;
      background: linear-gradient(180deg, #34d399, #059669);
      border: none;
      border-radius: 18px;
      padding: 12px 42px;
      margin-top: 14px;
      cursor: pointer;
      box-shadow: 0 4px 0 #047857;
    }
    #quiz-feedback { font-size: 24px; font-weight: bold; min-height: 32px; margin-top: 10px; }
    #quiz-feedback.good { color: #059669; }
    #quiz-feedback.bad { color: #dc2626; }
    #flash.on { animation: flash 0.45s ease-out; }
    @keyframes flash {
      0% { opacity: 1; }
      100% { opacity: 0; }
    }

    @media (min-width: 700px) and (max-width: 1180px) {
      #monster-box {
        margin-top: 10px;
        padding: 7px 14px 10px;
      }
      #gauge { width: 180px; }
      #message {
        max-width: calc(100vw - 28px);
        text-align: center;
        font-size: 24px;
        line-height: 1.25;
      }
      #message.clear { font-size: 32px; }
      #help { font-size: 14px; }
    }
  </style>
</head>
<body>
  <div id="ui">
    <div id="monster-box">
      <div class="label"><ruby>進化<rt>しんか</rt></ruby>ゲージ <span id="level">Lv.1</span></div>
      <div id="gauge"><div id="gauge-fill"></div></div>
    </div>
    <div id="message"></div>
    <div id="help">ドラッグで うごかそう ／ いらないブロックは りょうはしの「すてる ばしょ」へ</div>
  </div>
  <div id="flash"></div>
  <div id="quiz">
    <div id="quiz-panel">
      <div id="quiz-title">✏️ クイズタイム！</div>
      <div id="quiz-q"></div>
      <div id="quiz-sub"></div>
      <canvas id="quiz-canvas" width="1200" height="240"></canvas>
      <div id="quiz-answers"></div>
      <button id="quiz-confirm">けってい！</button>
      <div id="quiz-feedback"></div>
    </div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
